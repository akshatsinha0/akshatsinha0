name: Refresh profile art

"on":
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  contribution-grid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render contribution grid
        run: python scripts/generate_contribution_svg.py akshatsinha0 contribution-grid.svg

      - name: Commit refreshed art
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: contribution-grid.svg
